name: Weekly Map Update

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic
      - run: python actualizador_mapa.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: |
          git config user.name "Map Bot"
          git config user.email "bot@example.com"
          git diff --quiet index.html || (git add index.html && git commit -m "Weekly map update" && git push)
